<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luang Prabang International Airport - Departures</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-yellow: #ffcc00;
            --status-ontime: #00ff00;
            --status-delayed: #ff3333;
            --status-boarding: #ffcc00;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Chakra Petch', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* ป้องกัน scrollbar บนจอทีวี */
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-yellow);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header .time {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent-yellow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            font-size: 1.8rem;
            color: var(--text-muted);
            border-bottom: 2px solid #333;
            padding: 15px 10px;
            text-transform: uppercase;
        }
        td {
            font-size: 2.5rem;
            font-weight: 600;
            padding: 20px 10px;
            border-bottom: 1px solid #222;
        }
        .time-col { color: var(--accent-yellow); width: 12%; }
        .flight-col { width: 15%; }
        .airline-col { width: 20%; }
        .dest-col { width: 25%; }
        .gate-col { width: 8%; text-align: center; }
        .status-col { width: 20%; text-align: right; }
        
        /* Status Colors */
        .status-ON-TIME { color: var(--status-ontime); }
        .status-DELAYED { color: var(--status-delayed); }
        .status-BOARDING { color: var(--status-boarding); animation: blink 1.5s infinite; }
        .status-FINAL-CALL { color: var(--status-delayed); animation: blink 1s infinite; }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Departures / ຂາອອກ</h1>
        <div class="time" id="clock">00:00</div>
    </div>

    <table>
        <thead>
            <tr>
                <th class="time-col">Time</th>
                <th class="flight-col">Flight</th>
                <th class="airline-col">Airline</th>
                <th class="dest-col">Destination</th>
                <th class="gate-col">Gate</th>
                <th class="status-col">Status</th>
            </tr>
        </thead>
        <tbody id="flight-data">
            </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:6e52decfba29e9936ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // อัปเดตนาฬิกา
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false }).substring(0, 5);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ดึงข้อมูลเที่ยวบิน
        const flightsRef = ref(db, 'flights');
        onValue(flightsRef, (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('flight-data');
            tbody.innerHTML = '';

            if (data) {
                // แปลง object เป็น array และจัดเรียงตามเวลา
                const flights = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));
                flights.sort((a, b) => a.time.localeCompare(b.time));

                flights.forEach(flight => {
                    const statusClass = `status-${flight.status.replace(' ', '-')}`;
                    const row = `
                        <tr>
                            <td class="time-col">${flight.time}</td>
                            <td class="flight-col">${flight.flightNo}</td>
                            <td class="airline-col">${flight.airline}</td>
                            <td class="dest-col">${flight.destination}</td>
                            <td class="gate-col">${flight.gate}</td>
                            <td class="status-col ${statusClass}">${flight.status}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }
        });
    </script>
</body>
</html>
