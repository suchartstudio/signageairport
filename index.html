<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luang Prabang International Airport - Departures</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Noto+Sans+Lao:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-yellow: #ffcc00;
            --status-ontime: #00ff00;
            --status-delayed: #ff3333;
            --status-boarding: #ffcc00;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans Lao', 'Chakra Petch', 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden; 
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-yellow);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .header .time {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent-yellow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            font-size: 1.8rem;
            color: var(--text-muted);
            border-bottom: 2px solid #333;
            padding: 15px 5px;
        }
        td {
            font-size: 2.4rem;
            font-weight: 600;
            padding: 15px 5px;
            border-bottom: 1px solid #222;
            vertical-align: middle;
        }
        .time-col { color: var(--accent-yellow); width: 10%; }
        .flight-col { width: 12%; color: #fff; font-family: 'Chakra Petch', sans-serif; }
        .logo-col { width: 8%; text-align: center; }
        .airline-col { width: 18%; }
        .dest-col { width: 22%; }
        .gate-col { width: 10%; text-align: center; font-family: 'Chakra Petch', sans-serif; }
        .status-col { width: 20%; text-align: right; }
        
        .airline-logo {
            height: 42px;
            max-width: 100px;
            object-fit: contain;
            background-color: #ffffff; 
            padding: 4px 8px;
            border-radius: 6px;
            display: block;
            margin: 0 auto;
        }

        /* การจัดการสีสถานะตาม Key ภาษาลาว */
        .status-ON-TIME { color: var(--status-ontime); }
        .status-DELAYED { color: var(--status-delayed); }
        .status-BOARDING { color: var(--status-boarding); animation: blink 1.5s infinite; }
        .status-FINAL-CALL { color: var(--status-delayed); animation: blink 1s infinite; }
        .status-CANCELLED { color: var(--text-muted); text-decoration: line-through; }

        @keyframes blink { 50% { opacity: 0; } }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="page-title">ຂາອອກ (DEPARTURES)</h1>
        <div class="time" id="clock">00:00</div>
    </div>

    <table id="fids-table" class="fade-in">
        <thead>
            <tr>
                <th class="time-col" id="th-time">ເວລາ</th>
                <th class="flight-col" id="th-flight">Flight No.</th>
                <th class="logo-col" id="th-logo">ໂລໂກ້</th>
                <th class="airline-col" id="th-airline">ສາຍການບິນ</th>
                <th class="dest-col" id="th-dest">ປາຍທາງ</th>
                <th class="gate-col" id="th-gate">ປະຕູອອກ</th>
                <th class="status-col" id="th-status">ສະຖານະ</th>
            </tr>
        </thead>
        <tbody id="flight-data"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:6e52decfba29e9936ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // จับคู่โลโก้จากชื่อสายการบินภาษาลาวอัตโนมัติ
        const autoAirlineLogos = {
            "ການບິນລາວ": "https://upload.wikimedia.org/wikipedia/commons/2/20/Lao_Airlines_logo.svg",
            "ແອເອເຊຍ": "https://upload.wikimedia.org/wikipedia/commons/f/f5/AirAsia_New_Logo.svg",
            "ໄທແອເອເຊຍ": "https://upload.wikimedia.org/wikipedia/commons/f/f5/AirAsia_New_Logo.svg",
            "ບາງກອກແອເວ": "https://upload.wikimedia.org/wikipedia/commons/e/e0/Bangkok_Airways_logo.svg",
            "ການບິນໄທ": "https://upload.wikimedia.org/wikipedia/commons/c/c6/Thai_Airways_International_logo.svg",
            "ຫວຽດນາມແອລາຍ": "https://upload.wikimedia.org/wikipedia/commons/d/d7/Vietnam_Airlines_logo_2015.svg",
            "ໄຊນ່າອິສເທີນ": "https://upload.wikimedia.org/wikipedia/commons/a/aa/China_Eastern_Airlines_logo.svg",
            "ສະກູດ": "https://upload.wikimedia.org/wikipedia/commons/4/42/Scoot_Logo.svg"
        };

        // จับคู่สไตล์ CSS ตามสถานะภาษาลาว
        const statusStyleMap = {
            "ກົງເວລາ": "status-ON-TIME",
            "ກຳລັງຂຶ້ນເຄື່ອງ": "status-BOARDING",
            "ເອີ້ນຂຶ້ນເຄື່ອງຄັ້ງສຸດທ້າຍ": "status-FINAL-CALL",
            "ຊັກຊ້າ": "status-DELAYED",
            "ຍົກເລີກ": "status-CANCELLED"
        };

        // --- พจนานุกรมการแปลอัตโนมัติ โดยอ้างอิงคีย์หลักเป็นภาษาลาว ---
        const dictionary = {
            lo: {
                title: "ຂາອອກ (DEPARTURES)",
                headers: { time: "ເວລາ", flight: "Flight No.", logo: "ໂລໂກ້", airline: "ສາຍການບິນ", dest: "ປາຍທາງ", gate: "ປະຕູອອກ", status: "ສະຖານະ" },
                status: { "ກົງເວລາ": "ກົງເວລາ", "ກຳລັງຂຶ້ນເຄື່ອງ": "ກຳລັງຂຶ້ນເຄື່ອງ", "ເອີ້ນຂຶ້ນເຄື່ອງຄັ້ງສຸດທ້າຍ": "ເອີ້ນຂຶ້ນເຄື່ອງຄັ້ງສຸດທ້າຍ", "ຊັກຊ້າ": "ຊັກຊ້າ", "ຍົກເລີກ": "ຍົກເລີກ" },
                places: { "ວຽງຈັນ": "ວຽງຈັນ", "ບາງກອກ": "ບາງກອກ", "ຮ່າໂນ້ຍ": "ຮ່າໂນ້ຍ", "ຊຽງໃໝ່": "ຊຽງໃໝ່", "ສຽມຣຽບ": "ສຽມຣຽບ", "ຄຸນໝິງ": "ຄຸນໝິງ" },
                airlines: { "CN": "ການບິນລາว", "AA": "ແອເອເຊຍ", "TA": "ໄທແອເອເຊຍ", "PG": "ບາງກອກແອເວ", "TG": "ການບິນໄທ", "VN": "ຫວຽດນາມແອລາຍ", "MU": "ໄຊນ່າອິສເທີນ", "TR": "ສະກູດ" }
            },
            en: {
                title: "DEPARTURES",
                headers: { time: "Time", flight: "Flight No.", logo: "Logo", airline: "Airline", dest: "Destination", gate: "Gate", status: "Status" },
                status: { "ກົງເວລາ": "ON TIME", "ກຳລังຂຶ້ນເຄື່ອງ": "BOARDING", "ເອີ້ນຂຶ້ນເຄື່ອງຄັ້ງສຸດທ້າຍ": "FINAL CALL", "ຊັກຊ້າ": "DELAYED", "ຍົກເລີກ": "CANCELLED" },
                places: { "ວຽງຈັນ": "VIENTIANE", "ບາງກອກ": "BANGKOK", "ຮ່າໂນ້ຍ": "HANOI", "ຊຽງໃໝ່": "CHIANG MAI", "ສຽມຣຽບ": "SIEM REAP", "ຄຸນໝິງ": "KUNMING" },
                airlines: { "ການບິນລາວ": "LAO AIRLINES", "ແອເອເຊຍ": "AIRASIA", "...": "...", "ໄທແອເອເຊຍ": "THAI AIRASIA", "ບາງກອກແອເວ": "BANGKOK AIRWAYS", "...": "...", "ການບິນໄທ": "THAI AIRWAYS", "ຫວຽດນາມແອລາຍ": "VIETNAM AIRLINES", "ໄຊນ່າອิສເທີน": "CHINA EASTERN", "ສະກູດ": "SCOOT" }
            },
            zh: {
                title: "出发 (DEPARTURES)",
                headers: { time: "时间", flight: "Flight No.", logo: "标志", airline: "航空公司", dest: "目的地", gate: "登机口", status: "状态" },
                status: { "ກົງເວລາ": "准点", "ກຳລັງຂຶ້ນເຄື່ອງ": "登机中", "ເອີ້ນຂຶ້ນເຄື່ອງຄັ້ງສຸດທ້າຍ": "最后呼叫", "ຊັກຊ້າ": "延误", "ຍົກເລີກ": "取消" },
                places: { "ວຽງຈັນ": "万象", "ບາງກອກ": "曼谷", "ຮ່າໂນ້ຍ": "河内", "ຊຽງໃໝ່": "清迈", "ສຽມຣຽບ": "暹粒", "ຄຸນໝິງ": "昆明" },
                airlines: { "ການບິນລາວ": "老挝航空", "ແອເອเชຍ": "亚洲航空", "ໄທແອເອเชຍ": "泰国亚洲航空", "ບາງກອກແອເວ": "曼谷航空", "ການບິນໄท": "泰国航空", "ຫວຽດນามແອລາຍ": "越南航空", "ໄຊນ່າອິສເທີນ": "中国东方航空", "ສະກູດ": "酷航" }
            }
        };

        // ตั้งค่าให้ภาษาลาว (lo) เป็นค่าเริ่มต้นของอาเรย์ลำดับวนลูป
        const languages = ['lo', 'en', 'zh'];
        let currentLangIndex = 0;
        let flightList = []; 

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false }).substring(0, 5);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderUI() {
            const lang = languages[currentLangIndex];
            const dict = dictionary[lang];

            const tableElement = document.getElementById('fids-table');
            tableElement.classList.remove('fade-in');
            void tableElement.offsetWidth;
            tableElement.classList.add('fade-in');

            // อัปเดตส่วนหัวข้อตารางตามภาษาของรอบนั้นๆ
            document.getElementById('page-title').textContent = dict.title;
            document.getElementById('th-time').textContent = dict.headers.time;
            document.getElementById('th-flight').textContent = dict.headers.flight; 
            document.getElementById('th-logo').textContent = dict.headers.logo;
            document.getElementById('th-airline').textContent = dict.headers.airline;
            document.getElementById('th-dest').textContent = dict.headers.dest;
            document.getElementById('th-gate').textContent = dict.headers.gate;
            document.getElementById('th-status').textContent = dict.headers.status;

            const tbody = document.getElementById('flight-data');
            tbody.innerHTML = '';

            flightList.forEach(flight => {
                const rawStatus = flight.status.trim();
                const rawAirline = flight.airline.trim();
                const rawDest = flight.destination.trim();

                const statusClass = statusStyleMap[rawStatus] || "status-ON-TIME";
                
                // ค้นหาคำแปลโดยดึงข้อมูลภาษาลาวที่บันทึกไว้มาเป็นคีย์ตรวจสอบ
                const translatedStatus = dict.status[rawStatus] || rawStatus;
                const translatedDest = dict.places[rawDest] || rawDest;
                const translatedAirline = dict.airlines[rawAirline] || rawAirline;
                
                const finalLogoUrl = autoAirlineLogos[rawAirline] || flight.logoUrl;
                const logoHtml = finalLogoUrl 
                    ? `<img src="${finalLogoUrl}" class="airline-logo" onerror="this.style.display='none'">` 
                    : `-`;

                const row = `
                    <tr>
                        <td class="time-col">${flight.time}</td>
                        <td class="flight-col">${flight.flightNo}</td>
                        <td class="logo-col">${logoHtml}</td>
                        <td class="airline-col">${translatedAirline}</td>
                        <td class="dest-col">${translatedDest}</td>
                        <td class="gate-col">${flight.gate}</td>
                        <td class="status-col ${statusClass}">${translatedStatus}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        const flightsRef = ref(db, 'flights');
        onValue(flightsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                flightList = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));
                flightList.sort((a, b) => a.time.localeCompare(b.time));
                renderUI(); 
            } else {
                flightList = [];
                document.getElementById('flight-data').innerHTML = '';
            }
        });

        // วนลูปสลับหน้าจอ 3 ภาษา หน้าละ 30 วินาที
        setInterval(() => {
            currentLangIndex = (currentLangIndex + 1) % languages.length;
            renderUI();
        }, 30000);
    </script>
</body>
</html>
