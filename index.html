<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luang Prabang International Airport - Departures</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Noto+Sans+Lao:wght@400;600&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-yellow: #ffcc00;
            --status-ontime: #00ff00;
            --status-delayed: #ff3333;
            --status-boarding: #ffcc00;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Chakra Petch', 'Noto Sans Lao', 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden; 
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-yellow);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header .time {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent-yellow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            font-size: 1.8rem;
            color: var(--text-muted);
            border-bottom: 2px solid #333;
            padding: 15px 5px;
            text-transform: uppercase;
        }
        td {
            font-size: 2.2rem;
            font-weight: 600;
            padding: 15px 5px;
            border-bottom: 1px solid #222;
            vertical-align: middle;
        }
        .time-col { color: var(--accent-yellow); width: 10%; }
        .flight-col { width: 12%; color: #fff; }
        .logo-col { width: 8%; text-align: center; } /* คอลัมน์ Logo */
        .airline-col { width: 18%; }
        .dest-col { width: 22%; }
        .gate-col { width: 10%; text-align: center; }
        .status-col { width: 20%; text-align: right; }
        
        /* ตกแต่งโลโก้ */
        .airline-logo {
            height: 40px;
            max-width: 100px;
            object-fit: contain;
            background-color: #ffffff; /* พื้นหลังขาวช่วยให้โลโก้เด่นขึ้นบนจอดำ */
            padding: 4px 8px;
            border-radius: 6px;
            display: block;
            margin: 0 auto;
        }

        /* Status Colors */
        .status-ON-TIME { color: var(--status-ontime); }
        .status-DELAYED { color: var(--status-delayed); }
        .status-BOARDING { color: var(--status-boarding); animation: blink 1.5s infinite; }
        .status-FINAL-CALL { color: var(--status-delayed); animation: blink 1s infinite; }
        .status-CANCELLED { color: var(--text-muted); text-decoration: line-through; }

        @keyframes blink { 50% { opacity: 0; } }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="page-title">DEPARTURES</h1>
        <div class="time" id="clock">00:00</div>
    </div>

    <table id="fids-table" class="fade-in">
        <thead>
            <tr>
                <th class="time-col" id="th-time">Time</th>
                <!-- Flight No. จะไม่ถูกแปลภาษา -->
                <th class="flight-col" id="th-flight">Flight No.</th>
                <th class="logo-col" id="th-logo">Logo</th>
                <th class="airline-col" id="th-airline">Airline</th>
                <th class="dest-col" id="th-dest">Destination</th>
                <th class="gate-col" id="th-gate">Gate</th>
                <th class="status-col" id="th-status">Status</th>
            </tr>
        </thead>
        <tbody id="flight-data"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:6e52decfba29e9936ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- พจนานุกรมสำหรับสลับภาษา ---
        const dictionary = {
            en: {
                title: "DEPARTURES",
                headers: { time: "Time", flight: "Flight No.", logo: "Logo", airline: "Airline", dest: "Destination", gate: "Gate", status: "Status" },
                status: { "ON TIME": "ON TIME", "BOARDING": "BOARDING", "FINAL CALL": "FINAL CALL", "DELAYED": "DELAYED", "CANCELLED": "CANCELLED" },
                places: { "VIENTIANE": "VIENTIANE", "BANGKOK": "BANGKOK", "HANOI": "HANOI", "CHIANG MAI": "CHIANG MAI", "SIEM REAP": "SIEM REAP", "KUALA LUMPUR": "KUALA LUMPUR" },
                airlines: { "LAO AIRLINES": "LAO AIRLINES", "THAI AIRWAYS": "THAI AIRWAYS", "AIRASIA": "AIRASIA", "BANGKOK AIRWAYS": "BANGKOK AIRWAYS" }
            },
            lo: {
                title: "ຂາອອກ (DEPARTURES)",
                // สังเกตว่า flight ถูกฟิกซ์เป็น Flight No. ไว้
                headers: { time: "ເວລາ", flight: "Flight No.", logo: "ໂລໂກ້", airline: "ສາຍການບິນ", dest: "ປາຍທາງ", gate: "ປະຕູອອກ", status: "ສະຖານະ" },
                status: { "ON TIME": "ກົງເວລາ", "BOARDING": "ກຳລັງຂຶ້ນເຄື່ອງ", "FINAL CALL": "ເອີ້ນຂຶ້ນເຄື່ອງຄັ້ງສຸດທ້າຍ", "DELAYED": "ຊັກຊ້າ", "CANCELLED": "ຍົກເລີກ" },
                places: { "VIENTIANE": "ວຽງຈັນ", "BANGKOK": "ບາງກອກ", "HANOI": "ຮ່າໂນ້ຍ", "CHIANG MAI": "ຊຽງໃໝ່", "SIEM REAP": "ສຽມຣຽບ", "KUALA LUMPUR": "ກົວລາລຳເປີ" },
                airlines: { "LAO AIRLINES": "ການບິນລາວ", "THAI AIRWAYS": "ການບິນໄທ", "AIRASIA": "ແອເອເຊຍ", "BANGKOK AIRWAYS": "ບາງກອກແອເວ" }
            },
            zh: {
                title: "出发 (DEPARTURES)",
                headers: { time: "时间", flight: "Flight No.", logo: "标志", airline: "航空公司", dest: "目的地", gate: "登机口", status: "状态" },
                status: { "ON TIME": "准点", "BOARDING": "登机中", "FINAL CALL": "最后呼叫", "DELAYED": "延误", "CANCELLED": "取消" },
                places: { "VIENTIANE": "万象", "BANGKOK": "曼谷", "HANOI": "河内", "CHIANG MAI": "清迈", "SIEM REAP": "暹粒", "KUALA LUMPUR": "吉隆坡" },
                airlines: { "LAO AIRLINES": "老挝航空", "THAI AIRWAYS": "泰国航空", "AIRASIA": "亚洲航空", "BANGKOK AIRWAYS": "曼谷航空" }
            }
        };

        const languages = ['en', 'lo', 'zh'];
        let currentLangIndex = 0;
        let flightList = []; 

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false }).substring(0, 5);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderUI() {
            const lang = languages[currentLangIndex];
            const dict = dictionary[lang];

            const tableElement = document.getElementById('fids-table');
            tableElement.classList.remove('fade-in');
            void tableElement.offsetWidth;
            tableElement.classList.add('fade-in');

            // เปลี่ยนภาษา Headers (ยกเว้น Flight No. ที่เราฟิกซ์ค่าไว้ใน Dictionary แล้ว)
            document.getElementById('page-title').textContent = dict.title;
            document.getElementById('th-time').textContent = dict.headers.time;
            document.getElementById('th-flight').textContent = dict.headers.flight; 
            document.getElementById('th-logo').textContent = dict.headers.logo;
            document.getElementById('th-airline').textContent = dict.headers.airline;
            document.getElementById('th-dest').textContent = dict.headers.dest;
            document.getElementById('th-gate').textContent = dict.headers.gate;
            document.getElementById('th-status').textContent = dict.headers.status;

            const tbody = document.getElementById('flight-data');
            tbody.innerHTML = '';

            flightList.forEach(flight => {
                const statusClass = `status-${flight.status.replace(' ', '-')}`;
                
                // ค้นหาคำแปล ถ้าไม่มีให้แสดงคำต้นฉบับ
                const translatedStatus = dict.status[flight.status] || flight.status;
                const translatedDest = dict.places[flight.destination.toUpperCase()] || flight.destination;
                const translatedAirline = dict.airlines[flight.airline.toUpperCase()] || flight.airline;
                
                // ตรวจสอบโลโก้ ถ้าไม่ได้ใส่มาให้ซ่อนแท็กภาพ (onerror กันกรณีใส่ URL ผิด)
                const logoHtml = flight.logoUrl 
                    ? `<img src="${flight.logoUrl}" class="airline-logo" onerror="this.style.display='none'">` 
                    : `-`;

                const row = `
                    <tr>
                        <td class="time-col">${flight.time}</td>
                        <td class="flight-col">${flight.flightNo}</td>
                        <td class="logo-col">${logoHtml}</td>
                        <td class="airline-col">${translatedAirline}</td>
                        <td class="dest-col">${translatedDest}</td>
                        <td class="gate-col">${flight.gate}</td>
                        <td class="status-col ${statusClass}">${translatedStatus}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        const flightsRef = ref(db, 'flights');
        onValue(flightsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                flightList = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));
                flightList.sort((a, b) => a.time.localeCompare(b.time));
                renderUI(); 
            } else {
                flightList = [];
                document.getElementById('flight-data').innerHTML = '';
            }
        });

        // สลับภาษาทุกๆ 30 วินาที
        setInterval(() => {
            currentLangIndex = (currentLangIndex + 1) % languages.length;
            renderUI();
        }, 30000);

    </script>
</body>
</html>
