<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS Admin - Luang Prabang (With Edit & Logo)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Chakra Petch', sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label { font-size: 1.2rem; margin-bottom: 5px; color: #ffcc00; }
        input, select {
            padding: 12px;
            font-size: 1.2rem;
            font-family: 'Chakra Petch', sans-serif;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        .btn-container { display: flex; gap: 10px; }
        button {
            background-color: #ffcc00; color: #000; font-size: 1.5rem;
            font-weight: bold; padding: 15px; border: none; cursor: pointer;
            border-radius: 4px; width: 100%; margin-top: 10px; transition: background 0.2s;
        }
        button:hover { background-color: #e6b800; }
        #cancelEditBtn { background-color: #555; color: #fff; display: none; }
        #cancelEditBtn:hover { background-color: #444; }

        .flight-list { margin-top: 40px; }
        .flight-item {
            background: #2a2a2a; padding: 15px; margin-bottom: 10px;
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
        }
        .action-btns { display: flex; gap: 8px; }
        .edit-btn { background-color: #007bff; color: white; width: auto; padding: 8px 15px; font-size: 1rem; margin: 0; }
        .edit-btn:hover { background-color: #0056b3; }
        .delete-btn { background-color: #ff3333; color: white; width: auto; padding: 8px 15px; font-size: 1rem; margin: 0; }
        .delete-btn:hover { background-color: #cc2424; }
    </style>
</head>
<body>

    <h2 id="form-title">Control Panel - Add New Flight</h2>

    <form id="addFlightForm">
        <div class="form-group">
            <label>Time (HH:MM)</label>
            <input type="time" id="time" required>
        </div>
        <div class="form-group">
            <label>Flight No. (e.g. QV101)</label>
            <input type="text" id="flightNo" required>
        </div>
        <div class="form-group">
            <label>Airline Name</label>
            <input type="text" id="airline" required>
        </div>
        <!-- เพิ่มช่องใส่ Logo ที่นี่ -->
        <div class="form-group">
            <label>Airline Logo Image URL (Optional)</label>
            <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">
        </div>
        <div class="form-group">
            <label>Destination</label>
            <input type="text" id="destination" required>
        </div>
        <div class="form-group">
            <label>Gate</label>
            <input type="text" id="gate" required>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="status">
                <option value="ON TIME">ON TIME</option>
                <option value="BOARDING">BOARDING</option>
                <option value="FINAL CALL">FINAL CALL</option>
                <option value="DELAYED">DELAYED</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>
        </div>
        
        <div class="btn-container">
            <button type="submit" id="submitBtn">SAVE FLIGHT</button>
            <button type="button" id="cancelEditBtn">CANCEL EDIT</button>
        </div>
    </form>

    <div class="flight-list">
        <h2>Active Flights</h2>
        <div id="admin-flight-data"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:6e52decfba29e9936ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const flightsRef = ref(db, 'flights');

        let editFlightId = null; 
        let cacheFlights = {}; 

        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const form = document.getElementById('addFlightForm');

        function resetFormMode() {
            editFlightId = null;
            form.reset();
            formTitle.textContent = "Control Panel - Add New Flight";
            submitBtn.textContent = "SAVE FLIGHT";
            cancelEditBtn.style.display = "none";
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const flightData = {
                time: document.getElementById('time').value,
                flightNo: document.getElementById('flightNo').value.toUpperCase(),
                airline: document.getElementById('airline').value,
                logoUrl: document.getElementById('logoUrl').value, // ดึงค่า Logo URL
                destination: document.getElementById('destination').value.toUpperCase(),
                gate: document.getElementById('gate').value,
                status: document.getElementById('status').value
            };

            if (editFlightId) {
                update(ref(db, `flights/${editFlightId}`), flightData)
                    .then(() => resetFormMode());
            } else {
                push(flightsRef, flightData)
                    .then(() => resetFormMode());
            }
        });

        cancelEditBtn.addEventListener('click', resetFormMode);

        onValue(flightsRef, (snapshot) => {
            const data = snapshot.val();
            cacheFlights = data || {}; 
            
            const listContainer = document.getElementById('admin-flight-data');
            listContainer.innerHTML = '';

            if (data) {
                const sortedFlights = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));
                sortedFlights.sort((a, b) => a.time.localeCompare(b.time));

                sortedFlights.forEach(flight => {
                    const item = document.createElement('div');
                    item.className = 'flight-item';
                    item.innerHTML = `
                        <div>
                            <strong>${flight.time} - ${flight.flightNo}</strong> (${flight.airline})<br>
                            ${flight.destination} (Gate: ${flight.gate}) - <span style="color:#ffcc00">${flight.status}</span>
                        </div>
                        <div class="action-btns">
                            <button class="edit-btn" data-id="${flight.id}">Edit</button>
                            <button class="delete-btn" data-id="${flight.id}">Remove</button>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });

                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.getAttribute('data-id');
                        const flight = cacheFlights[id];
                        
                        if (flight) {
                            editFlightId = id;
                            document.getElementById('time').value = flight.time;
                            document.getElementById('flightNo').value = flight.flightNo;
                            document.getElementById('airline').value = flight.airline;
                            document.getElementById('logoUrl').value = flight.logoUrl || ""; // โหลด Logo URL เก่า
                            document.getElementById('destination').value = flight.destination;
                            document.getElementById('gate').value = flight.gate;
                            document.getElementById('status').value = flight.status;

                            formTitle.textContent = `Control Panel - Editing Flight [${flight.flightNo}]`;
                            submitBtn.textContent = "UPDATE FLIGHT";
                            cancelEditBtn.style.display = "block";
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.getAttribute('data-id');
                        if (confirm("Are you sure you want to delete this flight?")) {
                            remove(ref(db, `flights/${id}`));
                            if (editFlightId === id) resetFormMode();
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
