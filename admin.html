<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS Admin - Khon Kaen Airport</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Chakra Petch', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .login-box { background: #222; padding: 40px; border-radius: 8px; text-align: center; border: 2px solid #ffcc00; }
        .login-box input { padding: 10px; font-size: 1.2rem; width: 80%; margin-bottom: 15px; border-radius: 4px; border: none; text-align: center; }
        .app-container { display: flex; flex: 1; overflow: hidden; display: none; }
        .sidebar { width: 350px; background: #222; padding: 20px; border-right: 2px solid #333; overflow-y: auto; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; background: #1a1a1a; }
        h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; color: #ffcc00; margin-top: 0; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-size: 1.1rem; margin-bottom: 5px; color: #ffcc00; }
        input, select { padding: 10px; font-size: 1.1rem; font-family: 'Chakra Petch'; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        button { background-color: #ffcc00; color: #000; font-size: 1.2rem; font-weight: bold; padding: 12px; border: none; cursor: pointer; border-radius: 4px; width: 100%; transition: 0.2s; }
        button:hover { background-color: #e6b800; }
        .flight-list { display: grid; gap: 10px; }
        .flight-item { background: #2a2a2a; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #555; }
        .flight-info { font-size: 1.2rem; }
        .flight-actions { display: flex; gap: 10px; align-items: center; }
        .quick-status { background: #111; color: #ffcc00; border: 1px solid #ffcc00; padding: 8px; font-size: 1.1rem; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .delete-btn { background-color: #ff3333; color: white; padding: 8px 15px; width: auto; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="border: none;">ระบบจัดการตารางบิน (Admin)</h2>
            <input type="password" id="passInput" placeholder="ใส่รหัสผ่าน (878556)">
            <button onclick="checkPassword()">เข้าสู่ระบบ</button>
        </div>
    </div>
    <div class="app-container" id="main-app">
        <div class="sidebar">
            <h2>เพิ่มเที่ยวบินใหม่</h2>
            <form id="addFlightForm">
                <div class="form-group"><label>เวลา (HH:MM)</label><input type="time" id="time" required></div>
                <div class="form-group"><label>Flight No.</label><input type="text" id="flightNo" required></div>
                <div class="form-group"><label>สายการบิน</label><input type="text" id="airline" required></div>
                <div class="form-group"><label>ปลายทาง</label><input type="text" id="destination" required></div>
                <div class="form-group"><label>ทางออก (Gate)</label><input type="text" id="gate"></div>
                <div class="form-group">
                    <label>สถานะเริ่มต้น</label>
                    <select id="status">
                        <option value="ตรงเวลา">ตรงเวลา</option>
                        <option value="กำลังขึ้นเครื่อง">กำลังขึ้นเครื่อง</option>
                        <option value="เรียกขึ้นเครื่องครั้งสุดท้าย">เรียกขึ้นเครื่องครั้งสุดท้าย</option>
                        <option value="ล่าช้า">ล่าช้า</option>
                        <option value="ยกเลิก">ยกเลิก</option>
                    </select>
                </div>
                <button type="submit">บันทึกเที่ยวบิน</button>
            </form>
        </div>
        <div class="main-content">
            <h2>รายการเที่ยวบิน (Active Flights)</h2>
            <div class="flight-list" id="admin-flight-data"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0kMrUtVNSIzlAF9Rm6pSlJQ5eRZ3pk90",
            authDomain: "signage-b807a.firebaseapp.com",
            databaseURL: "https://signage-b807a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "signage-b807a",
            storageBucket: "signage-b807a.firebasestorage.app",
            messagingSenderId: "777605695730",
            appId: "1:777605695730:web:6692edc233eb40ee4be86b",
            measurementId: "G-5B03W79Q19"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const flightsRef = ref(db, 'flights');

        window.checkPassword = function() {
            // อัปเดตรหัสผ่านใหม่เป็น 878556
            if(document.getElementById('passInput').value === '878556') { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; } 
            else { alert('รหัสผ่านไม่ถูกต้อง'); }
        };

        document.getElementById('addFlightForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = { time: document.getElementById('time').value, flightNo: document.getElementById('flightNo').value.toUpperCase(), airline: document.getElementById('airline').value, destination: document.getElementById('destination').value, gate: document.getElementById('gate').value, status: document.getElementById('status').value };
            push(flightsRef, data).then(() => e.target.reset());
        });

        onValue(flightsRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('admin-flight-data'); list.innerHTML = '';
            if (data) {
                Object.entries(data).sort((a,b)=>a[1].time.localeCompare(b[1].time)).forEach(([id, f]) => {
                    const statusOptions = ["ตรงเวลา", "กำลังขึ้นเครื่อง", "เรียกขึ้นเครื่องครั้งสุดท้าย", "ล่าช้า", "ยกเลิก"].map(s => `<option value="${s}" ${f.status === s ? 'selected' : ''}>${s}</option>`).join('');
                    list.innerHTML += `<div class="flight-item"><div class="flight-info"><strong>${f.time} - ${f.flightNo}</strong> (${f.airline})<br><span style="color:#aaa;">ไป: ${f.destination} | Gate: ${f.gate || '-'}</span></div><div class="flight-actions"><select class="quick-status" onchange="quickUpdateStatus('${id}', this.value)">${statusOptions}</select><button class="delete-btn" onclick="delF('${id}')">ลบ</button></div></div>`;
                });
            }
        });

        window.quickUpdateStatus = (id, newStatus) => { update(ref(db, `flights/${id}`), { status: newStatus }); };
        window.delF = (id) => { if(confirm("ลบเที่ยวบินนี้?")) remove(ref(db, `flights/${id}`)); };
    </script>
</body>
</html>
