<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS Admin - Khon Kaen Airport</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Chakra Petch', sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label { font-size: 1.2rem; margin-bottom: 5px; color: #ffcc00; }
        input, select {
            padding: 12px;
            font-size: 1.2rem;
            font-family: 'Chakra Petch', sans-serif;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        .btn-container { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            background-color: #ffcc00; color: #000; font-size: 1.2rem;
            font-weight: bold; padding: 15px; border: none; cursor: pointer;
            border-radius: 4px; flex-grow: 1; margin-top: 10px; transition: background 0.2s;
        }
        button:hover { background-color: #e6b800; }
        
        #cancelEditBtn { background-color: #555; color: #fff; display: none; }
        #cancelEditBtn:hover { background-color: #444; }
        
        /* ปุ่มพิเศษสำหรับโหลดข้อมูลเริ่มต้น */
        #loadTemplateBtn {
            background-color: #00cc66; color: white; width: 100%;
            margin-bottom: 30px; font-size: 1.4rem;
        }
        #loadTemplateBtn:hover { background-color: #00b359; }

        .flight-list { margin-top: 40px; }
        .flight-item {
            background: #2a2a2a; padding: 15px; margin-bottom: 10px;
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
        }
        .action-btns { display: flex; gap: 8px; }
        .edit-btn { background-color: #007bff; color: white; padding: 8px 15px; font-size: 1rem; }
        .edit-btn:hover { background-color: #0056b3; }
        .delete-btn { background-color: #ff3333; color: white; padding: 8px 15px; font-size: 1rem; }
        .delete-btn:hover { background-color: #cc2424; }
    </style>
</head>
<body>

    <button id="loadTemplateBtn">📥 โหลดตารางเที่ยวบินขอนแก่นอัตโนมัติ (ขาออก ก.ค. 2026)</button>

    <h2 id="form-title">แผงควบคุม - เพิ่มเที่ยวบินใหม่</h2>

    <form id="addFlightForm">
        <div class="form-group">
            <label>เวลา (Time - HH:MM)</label>
            <input type="time" id="time" required>
        </div>
        <div class="form-group">
            <label>Flight No. (เช่น: TG041)</label>
            <input type="text" id="flightNo" required>
        </div>
        <div class="form-group">
            <label>สายการบิน (เช่น: การบินไทย, ไทยแอร์เอเชีย)</label>
            <input type="text" id="airline" placeholder="ป้อนชื่อสายการบินภาษาไทย" required>
        </div>
        <div class="form-group">
            <label>โลโก้ URL (ไม่บังคับ ระบบจะดึงอัตโนมัติถ้าพิมพ์ชื่อถูก)</label>
            <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">
        </div>
        <div class="form-group">
            <label>ปลายทาง (เช่น: สุวรรณภูมิ, ดอนเมือง, เชียงใหม่)</label>
            <input type="text" id="destination" placeholder="ป้อนปลายทางภาษาไทย" required>
        </div>
        <div class="form-group">
            <label>ทางออก (Gate)</label>
            <input type="text" id="gate">
        </div>
        <div class="form-group">
            <label>สถานะ (Status)</label>
            <select id="status">
                <option value="ตรงเวลา">ตรงเวลา (ON TIME)</option>
                <option value="กำลังขึ้นเครื่อง">กำลังขึ้นเครื่อง (BOARDING)</option>
                <option value="เรียกขึ้นเครื่องครั้งสุดท้าย">เรียกขึ้นเครื่องครั้งสุดท้าย (FINAL CALL)</option>
                <option value="ล่าช้า">ล่าช้า (DELAYED)</option>
                <option value="ยกเลิก">ยกเลิก (CANCELLED)</option>
            </select>
        </div>
        
        <div class="btn-container">
            <button type="submit" id="submitBtn">บันทึกเที่ยวบิน</button>
            <button type="button" id="cancelEditBtn">ยกเลิกการแก้ไข</button>
        </div>
    </form>

    <div class="flight-list">
        <h2>เที่ยวบินที่กำลังปฏิบัติการ (Active Flights)</h2>
        <div id="admin-flight-data"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:6e52decfba29e9936ebef8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const flightsRef = ref(db, 'flights');

        let editFlightId = null; 
        let cacheFlights = {}; 

        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const form = document.getElementById('addFlightForm');

        function resetFormMode() {
            editFlightId = null;
            form.reset();
            formTitle.textContent = "แผงควบคุม - เพิ่มเที่ยวบินใหม่";
            submitBtn.textContent = "บันทึกเที่ยวบิน";
            cancelEditBtn.style.display = "none";
        }

        // จัดการ Form Submit (เพิ่ม/แก้ไข)
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const flightData = {
                time: document.getElementById('time').value,
                flightNo: document.getElementById('flightNo').value.toUpperCase(),
                airline: document.getElementById('airline').value.trim(),
                logoUrl: document.getElementById('logoUrl').value.trim(),
                destination: document.getElementById('destination').value.trim(),
                gate: document.getElementById('gate').value.trim(),
                status: document.getElementById('status').value
            };

            if (editFlightId) {
                update(ref(db, `flights/${editFlightId}`), flightData).then(() => resetFormMode());
            } else {
                push(flightsRef, flightData).then(() => resetFormMode());
            }
        });

        cancelEditBtn.addEventListener('click', resetFormMode);

        // ดึงข้อมูลแสดงผลใน Admin
        onValue(flightsRef, (snapshot) => {
            const data = snapshot.val();
            cacheFlights = data || {}; 
            const listContainer = document.getElementById('admin-flight-data');
            listContainer.innerHTML = '';

            if (data) {
                const sortedFlights = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));
                sortedFlights.sort((a, b) => a.time.localeCompare(b.time));

                sortedFlights.forEach(flight => {
                    const item = document.createElement('div');
                    item.className = 'flight-item';
                    item.innerHTML = `
                        <div>
                            <strong>${flight.time} - ${flight.flightNo}</strong> (${flight.airline})<br>
                            ไปยัง: ${flight.destination} | Gate: ${flight.gate || '-'} | <span style="color:#ffcc00">${flight.status}</span>
                        </div>
                        <div class="action-btns">
                            <button class="edit-btn" data-id="${flight.id}">แก้ไข</button>
                            <button class="delete-btn" data-id="${flight.id}">ลบ</button>
                        </div>
                    `;
                    listContainer.appendChild(item);
                });

                // ปุ่มแก้ไข
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.getAttribute('data-id');
                        const flight = cacheFlights[id];
                        if (flight) {
                            editFlightId = id;
                            document.getElementById('time').value = flight.time;
                            document.getElementById('flightNo').value = flight.flightNo;
                            document.getElementById('airline').value = flight.airline;
                            document.getElementById('logoUrl').value = flight.logoUrl || "";
                            document.getElementById('destination').value = flight.destination;
                            document.getElementById('gate').value = flight.gate || "";
                            document.getElementById('status').value = flight.status;

                            formTitle.textContent = `แผงควบคุม - กำลังแก้ไข [${flight.flightNo}]`;
                            submitBtn.textContent = "อัปเดตเที่ยวบิน";
                            cancelEditBtn.style.display = "block";
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    });
                });

                // ปุ่มลบ
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.getAttribute('data-id');
                        if (confirm("คุณแน่ใจหรือไม่ว่าต้องการลบเที่ยวบินนี้?")) {
                            remove(ref(db, `flights/${id}`));
                            if (editFlightId === id) resetFormMode();
                        }
                    });
                });
            }
        });

        // --- ชุดข้อมูลเที่ยวบินขาออกขอนแก่น กรกฎาคม 2026 ---
        const kkDepartures = [
            { time: "08:30", flightNo: "TG041", airline: "การบินไทย", destination: "สุวรรณภูมิ", gate: "1", status: "ตรงเวลา", logoUrl: "" },
            { time: "08:35", flightNo: "FD3251", airline: "ไทยแอร์เอเชีย", destination: "ดอนเมือง", gate: "2", status: "ตรงเวลา", logoUrl: "" },
            { time: "08:40", flightNo: "VZ211", airline: "ไทยเวียตเจ็ท", destination: "สุวรรณภูมิ", gate: "3", status: "ตรงเวลา", logoUrl: "" },
            { time: "09:50", flightNo: "SL643", airline: "ไทยไลอ้อนแอร์", destination: "ดอนเมือง", gate: "1", status: "ตรงเวลา", logoUrl: "" },
            { time: "10:05", flightNo: "FD3249", airline: "ไทยแอร์เอเชีย", destination: "ดอนเมือง", gate: "2", status: "ตรงเวลา", logoUrl: "" },
            { time: "11:50", flightNo: "FD3255", airline: "ไทยแอร์เอเชีย", destination: "ดอนเมือง", gate: "3", status: "ตรงเวลา", logoUrl: "" },
            { time: "12:05", flightNo: "TG043", airline: "การบินไทย", destination: "สุวรรณภูมิ", gate: "1", status: "ตรงเวลา", logoUrl: "" },
            { time: "12:45", flightNo: "SL645", airline: "ไทยไลอ้อนแอร์", destination: "ดอนเมือง", gate: "2", status: "ตรงเวลา", logoUrl: "" },
            { time: "15:40", flightNo: "TG045", airline: "การบินไทย", destination: "สุวรรณภูมิ", gate: "3", status: "ตรงเวลา", logoUrl: "" },
            { time: "16:10", flightNo: "FD3261", airline: "ไทยแอร์เอเชีย", destination: "ดอนเมือง", gate: "1", status: "ตรงเวลา", logoUrl: "" },
            { time: "17:30", flightNo: "SL647", airline: "ไทยไลอ้อนแอร์", destination: "ดอนเมือง", gate: "2", status: "ตรงเวลา", logoUrl: "" },
            { time: "18:35", flightNo: "FD3257", airline: "ไทยแอร์เอเชีย", destination: "ดอนเมือง", gate: "3", status: "ตรงเวลา", logoUrl: "" },
            { time: "19:05", flightNo: "TG047", airline: "การบินไทย", destination: "สุวรรณภูมิ", gate: "1", status: "ตรงเวลา", logoUrl: "" },
            { time: "19:30", flightNo: "VZ215", airline: "ไทยเวียตเจ็ท", destination: "สุวรรณภูมิ", gate: "2", status: "ตรงเวลา", logoUrl: "" },
            { time: "20:10", flightNo: "SL649", airline: "ไทยไลอ้อนแอร์", destination: "ดอนเมือง", gate: "3", status: "ตรงเวลา", logoUrl: "" },
            { time: "20:30", flightNo: "FD3259", airline: "ไทยแอร์เอเชีย", destination: "ดอนเมือง", gate: "1", status: "ตรงเวลา", logoUrl: "" },
            { time: "21:00", flightNo: "FD5501", airline: "ไทยแอร์เอเชีย", destination: "เชียงใหม่", gate: "2", status: "ตรงเวลา", logoUrl: "" }
        ];

        // ปุ่มอัปโหลดข้อมูลเข้า Firebase
        document.getElementById('loadTemplateBtn').addEventListener('click', () => {
            if (confirm("การทำงานนี้จะลบข้อมูลปัจจุบันทั้งหมดและแทนที่ด้วยตารางเที่ยวบินขอนแก่น (ก.ค. 2026) ยืนยันหรือไม่?")) {
                // ล้างข้อมูลเก่าและแทนที่ด้วยข้อมูลใหม่แบบก้อนเดียว
                set(flightsRef, kkDepartures).then(() => {
                    alert("✅ โหลดข้อมูลตารางเที่ยวบินขอนแก่นทั้ง 17 เที่ยวบินสำเร็จ!");
                }).catch((error) => {
                    console.error(error);
                    alert("❌ เกิดข้อผิดพลาดในการโหลดข้อมูล");
                });
            }
        });
    </script>
</body>
</html>
