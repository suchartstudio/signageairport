<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDS Admin - Khon Kaen Airport</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Chakra Petch', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-size: 1.2rem; margin-bottom: 5px; color: #ffcc00; }
        input, select { padding: 12px; font-size: 1.2rem; font-family: 'Chakra Petch', sans-serif; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        .btn-container { display: flex; gap: 10px; }
        button { background-color: #ffcc00; color: #000; font-size: 1.2rem; font-weight: bold; padding: 15px; border: none; cursor: pointer; border-radius: 4px; flex-grow: 1; transition: background 0.2s; }
        button:hover { background-color: #e6b800; }
        #cancelEditBtn { background-color: #555; color: #fff; display: none; }
        .flight-list { margin-top: 40px; }
        .flight-item { background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .edit-btn { background-color: #007bff; color: white; padding: 8px 15px; }
        .delete-btn { background-color: #ff3333; color: white; padding: 8px 15px; }
    </style>
</head>
<body>

    <h2 id="form-title">แผงควบคุมตารางการบิน - เพิ่มเที่ยวบินใหม่</h2>

    <form id="addFlightForm">
        <div class="form-group"><label>เวลา (Time - HH:MM)</label><input type="time" id="time" required></div>
        <div class="form-group"><label>Flight No.</label><input type="text" id="flightNo" required></div>
        <div class="form-group"><label>สายการบิน</label><input type="text" id="airline" required></div>
        <div class="form-group"><label>ปลายทาง</label><input type="text" id="destination" required></div>
        <div class="form-group"><label>ทางออก (Gate)</label><input type="text" id="gate"></div>
        <div class="form-group">
            <label>สถานะ (Status)</label>
            <select id="status">
                <option value="ตรงเวลา">ตรงเวลา (ON TIME)</option>
                <option value="กำลังขึ้นเครื่อง">กำลังขึ้นเครื่อง (BOARDING)</option>
                <option value="เรียกขึ้นเครื่องครั้งสุดท้าย">เรียกขึ้นเครื่องครั้งสุดท้าย (FINAL CALL)</option>
                <option value="ล่าช้า">ล่าช้า (DELAYED)</option>
                <option value="ยกเลิก">ยกเลิก (CANCELLED)</option>
            </select>
        </div>
        
        <div class="btn-container">
            <button type="submit" id="submitBtn">บันทึกเที่ยวบิน</button>
            <button type="button" id="cancelEditBtn">ยกเลิกการแก้ไข</button>
        </div>
    </form>

    <div class="flight-list">
        <h2>เที่ยวบินปัจจุบัน (Active Flights)</h2>
        <div id="admin-flight-data"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk", authDomain: "suchartstudio-9a78d.firebaseapp.com", databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "suchartstudio-9a78d", storageBucket: "suchartstudio-9a78d.firebasestorage.app", messagingSenderId: "953369646185", appId: "1:953369646185:web:6e52decfba29e9936ebef8" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const flightsRef = ref(db, 'flights');

        let editFlightId = null; let cacheFlights = {}; 
        const form = document.getElementById('addFlightForm');

        function resetForm() { editFlightId = null; form.reset(); document.getElementById('form-title').textContent = "เพิ่มเที่ยวบินใหม่"; document.getElementById('submitBtn').textContent = "บันทึกเที่ยวบิน"; document.getElementById('cancelEditBtn').style.display = "none"; }
        document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = { time: document.getElementById('time').value, flightNo: document.getElementById('flightNo').value.toUpperCase(), airline: document.getElementById('airline').value, destination: document.getElementById('destination').value, gate: document.getElementById('gate').value, status: document.getElementById('status').value };
            if (editFlightId) update(ref(db, `flights/${editFlightId}`), data).then(resetForm);
            else push(flightsRef, data).then(resetForm);
        });

        onValue(flightsRef, (snapshot) => {
            const data = snapshot.val(); cacheFlights = data || {}; 
            const list = document.getElementById('admin-flight-data'); list.innerHTML = '';
            if (data) {
                Object.entries(data).sort((a,b)=>a[1].time.localeCompare(b[1].time)).forEach(([id, f]) => {
                    list.innerHTML += `<div class="flight-item">
                        <div><strong>${f.time} - ${f.flightNo}</strong> (${f.airline})<br>ไป: ${f.destination} | Gate: ${f.gate || '-'} | <span style="color:#ffcc00">${f.status}</span></div>
                        <div><button class="edit-btn" onclick="editF('${id}')">แก้ไข</button> <button class="delete-btn" onclick="delF('${id}')">ลบ</button></div>
                    </div>`;
                });
            }
        });
        window.editF = (id) => { const f = cacheFlights[id]; if(f) { editFlightId = id; document.getElementById('time').value = f.time; document.getElementById('flightNo').value = f.flightNo; document.getElementById('airline').value = f.airline; document.getElementById('destination').value = f.destination; document.getElementById('gate').value = f.gate; document.getElementById('status').value = f.status; document.getElementById('cancelEditBtn').style.display = "block"; } };
        window.delF = (id) => { if(confirm("ลบเที่ยวบินนี้?")) remove(ref(db, `flights/${id}`)); };
    </script>
</body>
</html>
