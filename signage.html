<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Signage Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Chakra Petch', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; transition: background 0.5s ease; }
        
        /* Container หลัก */
        #display-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        /* รูปแบบภาพนิ่ง / สไลด์ */
        .image-display { width: 100%; height: 100%; object-fit: cover; animation: fade 1s ease-in-out; }
        
        /* รูปแบบป้ายบอกทาง (Wayfinding) */
        .wayfinding-display { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 40px; padding: 50px; text-align: center; width: 100%; height: 100%; box-sizing: border-box; }
        .wf-text { font-weight: 700; line-height: 1.2; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .wf-arrow { font-size: 1.5em; /* ขนาดอิงตามตัวหนังสือ */ }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="display-container">
        <h1 style="color: #fff;">กำลังเชื่อมต่อกับระบบควบคุมสนามบิน...</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ดึงค่า ID ของหน้าจอจาก URL (เช่น ?id=screen_01)
        const urlParams = new URLSearchParams(window.location.search);
        const screenId = urlParams.get('id') || 'screen_01'; // ถ้าไม่ระบุ จะใช้ screen_01 เป็นค่าหลัก
        
        const container = document.getElementById('display-container');
        let slideInterval; // ตัวแปรเก็บ loop สไลด์

        // รับคำสั่งจาก Firebase แบบ Real-time
        onValue(ref(db, `screens/${screenId}`), (snapshot) => {
            const config = snapshot.val();
            
            // ล้างข้อมูลและ Interval เก่าทุกครั้งที่มีคำสั่งใหม่เข้า
            clearInterval(slideInterval);
            container.innerHTML = '';
            document.body.style.backgroundColor = '#000'; // รีเซ็ตสีพื้นหลัง

            if (!config) {
                container.innerHTML = `<h1 style="color:#555;">ยังไม่มีการตั้งค่าสำหรับจอนี้ (${screenId})</h1>`;
                return;
            }

            // --- วาด UI ตามประเภทคำสั่ง (Type) ---
            if (config.type === 'wayfinding') {
                // จัดการหน้าตาป้ายบอกทาง
                document.body.style.backgroundColor = config.bgColor || '#0a0a0a';
                
                const wfDiv = document.createElement('div');
                wfDiv.className = 'wayfinding-display';
                wfDiv.style.color = config.textColor || '#ffffff';
                wfDiv.style.fontSize = config.fontSize || '6rem';

                let arrowHtml = '';
                if (config.arrow && config.arrow !== 'none') {
                    arrowHtml = `<span class="wf-arrow">${config.arrow}</span>`;
                }
                
                // ถ้าเป็นลูกศรชี้ซ้าย ให้ลูกศรอยู่หน้าข้อความ นอกนั้นให้อยู่หลัง
                if (config.arrow === '←') {
                    wfDiv.innerHTML = `${arrowHtml} <span class="wf-text">${config.text}</span>`;
                } else {
                    wfDiv.innerHTML = `<span class="wf-text">${config.text}</span> ${arrowHtml}`;
                }
                container.appendChild(wfDiv);

            } else if (config.type === 'static_image') {
                // จัดการโปสเตอร์ 1 รูป
                if(config.imageUrl) {
                    container.innerHTML = `<img src="${config.imageUrl}" class="image-display">`;
                }

            } else if (config.type === 'slider') {
                // จัดการระบบสไลด์รูปภาพ
                if (config.images && config.images.length > 0) {
                    let currentIdx = 0;
                    const imgElement = document.createElement('img');
                    imgElement.className = 'image-display';
                    imgElement.src = config.images[currentIdx];
                    container.appendChild(imgElement);

                    const intervalTime = (config.interval || 5) * 1000;
                    
                    if (config.images.length > 1) {
                        slideInterval = setInterval(() => {
                            currentIdx = (currentIdx + 1) % config.images.length;
                            // ซ่อนรูปเก่า
                            imgElement.style.opacity = '0';
                            setTimeout(() => {
                                imgElement.src = config.images[currentIdx];
                                imgElement.style.opacity = '1';
                            }, 300); // ระยะเวลา crossfade
                        }, intervalTime);
                    }
                }
            }
        });
    </script>
</body>
</html>
