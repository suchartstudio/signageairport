<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <title>Signage Control Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Noto Sans Lao', 'Chakra Petch', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #lang-switcher { position: fixed; top: 15px; right: 20px; z-index: 10000; display: flex; gap: 5px; }
        .btn-lang { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; font-size: 1rem; border-radius: 4px; cursor: pointer; width: auto; margin-bottom: 0; font-family: sans-serif; }
        .btn-lang.active { background: #ffcc00; color: #000; font-weight: bold; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .login-box { background: #222; padding: 40px; border-radius: 8px; text-align: center; border: 2px solid #ffcc00; }
        .login-box input { padding: 10px; font-size: 1.2rem; width: 80%; margin-bottom: 15px; border-radius: 4px; text-align: center; border: none; }
        
        .sidebar { width: 360px; background: #222; padding: 20px; overflow-y: auto; border-right: 2px solid #444; display: flex; flex-direction: column; gap: 15px; }
        .sidebar h2 { color: #ffcc00; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 1.4rem; }
        select, input, button { width: 100%; padding: 10px; font-family: 'Noto Sans Lao', 'Chakra Petch'; box-sizing: border-box; background: #333; color: white; border: 1px solid #555; border-radius: 4px; margin-bottom: 5px; }
        button { cursor: pointer; font-weight: bold; border: none; }
        .btn-add { background: #007bff; } .btn-add:hover { background: #0056b3; }
        .btn-save { background: #00cc66; font-size: 1.2rem; color: black; margin-top: 10px; }
        .screen-link { display: inline-block; color: #00aaff; margin-top: 5px; font-size: 1.1rem; text-decoration: none; }
        .screen-link:hover { text-decoration: underline; }
        #props-panel { background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #444; display: none; }
        .layer-controls { display: flex; gap: 10px; margin-top: 10px; }
        .layer-controls button { background: #444; margin: 0; }
        
        .main-area { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; }
        #canvas { width: 100%; max-width: 1000px; aspect-ratio: 16/9; background: #000; position: relative; border: 2px dashed #555; overflow: hidden; }
        .element { position: absolute; user-select: none; cursor: grab; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
        .element.active { border: 2px solid #ffcc00 !important; }
        .resizer { width: 15px; height: 15px; background: #ffcc00; position: absolute; right: -5px; bottom: -5px; cursor: se-resize; border-radius: 50%; display: none; }
        .element.active .resizer { display: block; }
    </style>
</head>
<body>

    <div id="lang-switcher">
        <button class="btn-lang active" onclick="setSysLang('lo')">🇱🇦 ລາວ</button>
        <button class="btn-lang" onclick="setSysLang('en')">🇬🇧 EN</button>
        <button class="btn-lang" onclick="setSysLang('th')">🇹🇭 TH</button>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <h2 id="ui_login_title" style="border: none;">ລະບົບຄວບຄຸມປ້າຍ</h2>
            <input type="password" id="passInput" placeholder="ໃສ່ລະຫັດຜ່ານ...">
            <button id="ui_btn_login" onclick="checkPassword()" style="background:#ffcc00; color:#000;">ເຂົ້າສູ່ລະບົບ</button>
        </div>
    </div>
    <div class="sidebar">
        <h2 id="ui_manage_title">ຈັດການຈໍພາບ (Screens)</h2>
        <select id="screenSelect"></select>
        <div style="display: flex; gap: 10px;">
            <button id="ui_btn_new_screen" onclick="createNewScreen()" style="background: #28a745;">➕ ສ້າງຈໍໃໝ່</button>
            <button id="ui_btn_del_screen" onclick="deleteCurrentScreen()" style="background: #dc3545;">🗑️ ລຶບຈໍ</button>
        </div>
        <a href="#" id="viewScreenLink" class="screen-link" target="_blank">🔗 ເປີດເບິ່ງຈໍພາບ</a>
        <button id="ui_btn_save_layout" class="btn-save" onclick="saveLayout()">💾 ບັນທຶກເລເອົາ</button>

        <h2 id="ui_add_el_title">ເພີ່ມອົງປະກອບ</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button id="ui_btn_add_text" class="btn-add" onclick="addElement('text')">📝 ຂໍ້ຄວາມ</button>
            <button id="ui_btn_add_image" class="btn-add" onclick="triggerImageUpload()">🖼️ ອັບໂຫຼດຮູບ</button>
            <button id="ui_btn_add_shape" class="btn-add" onclick="addElement('shape')">🟦 ກອບສີ</button>
            <button id="ui_btn_add_clock" class="btn-add" onclick="addElement('clock')">⏰ ໂມງ</button>
        </div>
        <input type="file" id="imageUploader" accept="image/*" style="display: none;">

        <div id="props-panel">
            <h3 id="ui_props_title" style="margin-top:0; color:#ffcc00;">ຕັ້ງຄ່າວັດຖຸ</h3>
            <div id="props-content"></div>
            <label id="ui_lbl_zindex" style="margin-top:10px; display:block; color:#aaa;">ຈັດການ Layer (Z-Index)</label>
            <div class="layer-controls">
                <button id="ui_btn_up" onclick="changeLayer(1)">▲ ດັນຂຶ້ນ</button>
                <button id="ui_btn_down" onclick="changeLayer(-1)">▼ ສົ່ງລົງ</button>
            </div>
            <button id="ui_btn_del_el" onclick="deleteActiveElement()" style="background:#ff3333; margin-top:15px;">🗑️ ລຶບວັດຖຸນີ້</button>
        </div>
    </div>
    <div class="main-area">
        <h2 id="ui_editor_title" style="margin-top:0;">Layout Editor (ລາກ, ວາງ, ຂະຫຍາຍ, ຈັດ Layer)</h2>
        <div id="canvas"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyC0kMrUtVNSIzlAF9Rm6pSlJQ5eRZ3pk90", authDomain: "signage-b807a.firebaseapp.com", databaseURL: "https://signage-b807a-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "signage-b807a", storageBucket: "signage-b807a.firebasestorage.app", messagingSenderId: "777605695730", appId: "1:777605695730:web:6692edc233eb40ee4be86b", measurementId: "G-5B03W79Q19" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // --- ระบบแปลภาษา UI ---
        const uiDict = {
            lo: {
                login_title: "ລະບົບຄວບຄຸມປ້າຍ", pass_ph: "ໃສ່ລະຫັດຜ່ານ...", btn_login: "ເຂົ້າສູ່ລະບົບ",
                manage_title: "ຈັດການຈໍພາບ (Screens)", btn_new_screen: "➕ ສ້າງຈໍໃໝ່", btn_del_screen: "🗑️ ລຶບຈໍ",
                view_screen: "🔗 ເປີດເບິ່ງຈໍພາບ:", btn_save_layout: "💾 ບັນທຶກເລເອົາ", add_el_title: "ເພີ່ມອົງປະກອບ",
                btn_add_text: "📝 ຂໍ້ຄວາມ", btn_add_image: "🖼️ ອັບໂຫຼດຮູບ", btn_add_shape: "🟦 ກອບສີ", btn_add_clock: "⏰ ໂມງ",
                props_title: "ຕັ້ງຄ່າວັດຖຸທີ່ເລືອກ", lbl_zindex: "ຈັດການ Layer (Z-Index)", btn_up: "▲ ດັນຂຶ້ນ", btn_down: "▼ ສົ່ງລົງ",
                btn_del_el: "🗑️ ລຶບວັດຖຸນີ້", editor_title: "Layout Editor (ລາກ, ວາງ, ຂະຫຍາຍ, ຈັດ Layer)",
                alert_wrong: "ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ", prompt_screen: "ຕັ້ງຊື່ຈໍພາບໃໝ່:", alert_no_del: "ບໍ່ສາມາດລຶບຈໍຫຼັກໄດ້",
                confirm_del_screen: "ລຶບຈໍພາບນີ້ຖາວອນ?", alert_save: "ບັນທຶກໜ້າຈໍຮຽບຮ້ອຍແລ້ວ!",
                lbl_text: "ຂໍ້ຄວາມ:", lbl_color: "ສີຕົວອັກສອນ:", lbl_size: "ຂະໜາດ (vw):", lbl_clock_col: "ສີໂມງ:", lbl_bg: "ສີພື້ນຫຼັງ:",
                uploading: "⏳ ກຳລັງອັບໂຫຼດ..."
            },
            en: {
                login_title: "Signage Control Editor", pass_ph: "Enter password...", btn_login: "Login",
                manage_title: "Manage Screens", btn_new_screen: "➕ New Screen", btn_del_screen: "🗑️ Delete",
                view_screen: "🔗 View Screen:", btn_save_layout: "💾 Save Layout", add_el_title: "Add Elements",
                btn_add_text: "📝 Text", btn_add_image: "🖼️ Image", btn_add_shape: "🟦 Shape", btn_add_clock: "⏰ Clock",
                props_title: "Element Properties", lbl_zindex: "Manage Layer (Z-Index)", btn_up: "▲ Move Up", btn_down: "▼ Move Down",
                btn_del_el: "🗑️ Delete Element", editor_title: "Layout Editor (Drag, Drop, Resize, Layers)",
                alert_wrong: "Incorrect password", prompt_screen: "New screen name:", alert_no_del: "Cannot delete main screen",
                confirm_del_screen: "Delete this screen permanently?", alert_save: "Layout saved successfully!",
                lbl_text: "Text:", lbl_color: "Text Color:", lbl_size: "Size (vw):", lbl_clock_col: "Clock Color:", lbl_bg: "Background:",
                uploading: "⏳ Uploading..."
            },
            th: {
                login_title: "ระบบควบคุมป้าย", pass_ph: "ใส่รหัสผ่าน...", btn_login: "เข้าสู่ระบบ",
                manage_title: "จัดการจอภาพ (Screens)", btn_new_screen: "➕ สร้างจอใหม่", btn_del_screen: "🗑️ ลบจอ",
                view_screen: "🔗 เปิดดูจอภาพ:", btn_save_layout: "💾 บันทึกเลย์เอาต์", add_el_title: "เพิ่มองค์ประกอบ",
                btn_add_text: "📝 ข้อความ", btn_add_image: "🖼️ อัปโหลดรูปภาพ", btn_add_shape: "🟦 กรอบสี", btn_add_clock: "⏰ นาฬิกา",
                props_title: "ตั้งค่าวัตถุที่เลือก", lbl_zindex: "จัดการ Layer (Z-Index)", btn_up: "▲ ดันขึ้น", btn_down: "▼ ส่งลง",
                btn_del_el: "🗑️ ลบวัตถุนี้", editor_title: "Layout Editor (ลาก, วาง, ขยาย, จัด Layer)",
                alert_wrong: "รหัสผ่านไม่ถูกต้อง", prompt_screen: "ตั้งชื่อจอภาพใหม่:", alert_no_del: "ไม่สามารถลบจอหลักได้",
                confirm_del_screen: "ลบจอภาพและเลย์เอาต์นี้ถาวร?", alert_save: "บันทึกหน้าจอเรียบร้อยแล้ว!",
                lbl_text: "ข้อความ:", lbl_color: "สีตัวอักษร:", lbl_size: "ขนาด (vw):", lbl_clock_col: "สีนาฬิกา:", lbl_bg: "สีพื้นหลัง:",
                uploading: "⏳ กำลังอัปโหลด..."
            }
        };

        let sysLang = localStorage.getItem('control_lang') || 'lo';
        
        window.setSysLang = function(lang) {
            sysLang = lang; localStorage.setItem('control_lang', lang);
            document.querySelectorAll('.btn-lang').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateUILang(); updatePropsPanel(); updateScreenLink();
        };
        const t = (key) => uiDict[sysLang][key];

        function updateUILang() {
            document.getElementById('ui_login_title').textContent = t('login_title');
            document.getElementById('passInput').placeholder = t('pass_ph');
            document.getElementById('ui_btn_login').textContent = t('btn_login');
            document.getElementById('ui_manage_title').textContent = t('manage_title');
            document.getElementById('ui_btn_new_screen').textContent = t('btn_new_screen');
            document.getElementById('ui_btn_del_screen').textContent = t('btn_del_screen');
            document.getElementById('ui_btn_save_layout').textContent = t('btn_save_layout');
            document.getElementById('ui_add_el_title').textContent = t('add_el_title');
            document.getElementById('ui_btn_add_text').textContent = t('btn_add_text');
            document.getElementById('ui_btn_add_image').textContent = t('btn_add_image');
            document.getElementById('ui_btn_add_shape').textContent = t('btn_add_shape');
            document.getElementById('ui_btn_add_clock').textContent = t('btn_add_clock');
            document.getElementById('ui_props_title').textContent = t('props_title');
            document.getElementById('ui_lbl_zindex').textContent = t('lbl_zindex');
            document.getElementById('ui_btn_up').textContent = t('btn_up');
            document.getElementById('ui_btn_down').textContent = t('btn_down');
            document.getElementById('ui_btn_del_el').textContent = t('btn_del_el');
            document.getElementById('ui_editor_title').textContent = t('editor_title');
        }

        let elements = []; let activeId = null; let currentScreen = 'screen_main'; const canvas = document.getElementById('canvas');

        window.checkPassword = function() {
            if(document.getElementById('passInput').value === '878556') { document.getElementById('login-overlay').style.display = 'none'; } 
            else { alert(t('alert_wrong')); }
        };

        onValue(ref(db, 'signage_meta/screens'), (snapshot) => {
            const screens = snapshot.val() || { "screen_main": { name: "Main Screen" }};
            const select = document.getElementById('screenSelect'); select.innerHTML = '';
            for(let id in screens) { select.innerHTML += `<option value="${id}">${screens[id].name}</option>`; }
            select.value = currentScreen; updateScreenLink(); loadLayoutData();
        });

        document.getElementById('screenSelect').addEventListener('change', (e) => { currentScreen = e.target.value; updateScreenLink(); loadLayoutData(); });
        function updateScreenLink() { const link = document.getElementById('viewScreenLink'); link.href = `signage.html?screen=${currentScreen}`; link.textContent = `${t('view_screen')} ${currentScreen}`; }

        window.createNewScreen = function() {
            const name = prompt(t('prompt_screen'));
            if(name) { const id = 'screen_' + Date.now(); set(ref(db, `signage_meta/screens/${id}`), { name: name }); currentScreen = id; }
        }
        window.deleteCurrentScreen = function() {
            if(currentScreen === 'screen_main') return alert(t('alert_no_del'));
            if(confirm(t('confirm_del_screen'))) { remove(ref(db, `signage_meta/screens/${currentScreen}`)); remove(ref(db, `signage/${currentScreen}`)); currentScreen = 'screen_main'; }
        }

        function loadLayoutData() { onValue(ref(db, `signage/${currentScreen}`), (snapshot) => { elements = snapshot.val() || []; activeId = null; renderCanvas(); updatePropsPanel(); }, { onlyOnce: true }); }

        window.triggerImageUpload = () => document.getElementById('imageUploader').click();
        document.getElementById('imageUploader').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const btn = document.getElementById('ui_btn_add_image'); btn.textContent = t('uploading');
            try {
                const sRef = storageRef(storage, `signage_images/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                elements.push({ id: Date.now(), type: 'image', url: url, x: 40, y: 40, w: 20, h: 30, zIndex: elements.length + 1 });
                renderCanvas(); saveLayout(false);
            } catch(err) { alert("Upload failed. Check Firebase Storage rules (allow read, write: if true;)"); console.error(err); }
            btn.textContent = t('btn_add_image'); e.target.value = '';
        });

        window.addElement = function(type) {
            const el = { id: Date.now(), type, x: 40, y: 40, w: 20, h: 20, zIndex: elements.length + 1 };
            if(type === 'text') { el.content = 'Text'; el.color = '#ffffff'; el.fontSize = 3; el.h = 10; }
            if(type === 'shape') { el.bgColor = '#ffcc00'; }
            if(type === 'clock') { el.color = '#ffffff'; el.fontSize = 4; el.h = 10; }
            elements.push(el); activeId = el.id; renderCanvas(); updatePropsPanel();
        }

        window.changeLayer = function(dir) { const el = elements.find(e => e.id === activeId); if(el) { el.zIndex = Math.max(1, (el.zIndex || 1) + dir); renderCanvas(); updatePropsPanel(); } }
        window.deleteActiveElement = function() { elements = elements.filter(e => e.id !== activeId); activeId = null; renderCanvas(); updatePropsPanel(); }

        function renderCanvas() {
            canvas.innerHTML = '';
            const sortedElements = [...elements].sort((a,b) => (a.zIndex || 1) - (b.zIndex || 1));
            sortedElements.forEach(el => {
                const div = document.createElement('div');
                div.className = `element ${el.id === activeId ? 'active' : ''}`; div.style.left = `${el.x}%`; div.style.top = `${el.y}%`; div.style.width = `${el.w}%`; div.style.height = `${el.h}%`; div.style.zIndex = el.zIndex || 1;
                if(el.type === 'shape') { div.style.backgroundColor = el.bgColor; }
                if(el.type === 'image') { div.style.backgroundImage = `url(${el.url})`; div.style.backgroundSize = 'contain'; div.style.backgroundRepeat = 'no-repeat'; div.style.backgroundPosition = 'center'; }
                if(el.type === 'text') { div.textContent = el.content; div.style.color = el.color; div.style.fontSize = `${el.fontSize}vw`; div.style.fontWeight = 'bold'; }
                if(el.type === 'clock') { div.textContent = '12:00'; div.style.color = el.color; div.style.fontSize = `${el.fontSize}vw`; div.style.fontWeight = 'bold'; }
                const resizer = document.createElement('div'); resizer.className = 'resizer'; div.appendChild(resizer);
                div.addEventListener('mousedown', (e) => startDrag(e, el)); resizer.addEventListener('mousedown', (e) => startResize(e, el));
                canvas.appendChild(div);
            });
        }

        let isDragging = false, isResizing = false, targetEl = null, startX, startY, startW, startH;
        function startDrag(e, el) { if(e.target.classList.contains('resizer')) return; isDragging = true; targetEl = elements.find(e_orig => e_orig.id === el.id); activeId = el.id; startX = e.clientX; startY = e.clientY; renderCanvas(); updatePropsPanel(); }
        function startResize(e, el) { isResizing = true; targetEl = elements.find(e_orig => e_orig.id === el.id); activeId = el.id; startX = e.clientX; startY = e.clientY; startW = targetEl.w; startH = targetEl.h; e.stopPropagation(); }
        document.addEventListener('mousemove', (e) => {
            if(!targetEl) return; const rect = canvas.getBoundingClientRect();
            if(isDragging) { targetEl.x += ((e.clientX - startX) / rect.width) * 100; targetEl.y += ((e.clientY - startY) / rect.height) * 100; startX = e.clientX; startY = e.clientY; renderCanvas(); }
            if(isResizing) { targetEl.w = Math.max(5, startW + ((e.clientX - startX) / rect.width) * 100); targetEl.h = Math.max(5, startH + ((e.clientY - startY) / rect.height) * 100); renderCanvas(); }
        });
        document.addEventListener('mouseup', () => { isDragging = false; isResizing = false; targetEl = null; });

        window.updateProp = function(prop, val) { const el = elements.find(e => e.id === activeId); if(el) { el[prop] = val; renderCanvas(); } }
        function updatePropsPanel() {
            const panel = document.getElementById('props-panel'); const content = document.getElementById('props-content'); const el = elements.find(e => e.id === activeId);
            if(!el) { panel.style.display = 'none'; return; }
            panel.style.display = 'block'; let html = `<p style="margin:0 0 10px 0; color:#aaa;">Z-Index: ${el.zIndex || 1}</p>`;
            if(el.type === 'text') { html += `<label>${t('lbl_text')}</label><input type="text" value="${el.content}" oninput="updateProp('content', this.value)"><label>${t('lbl_color')}</label><input type="color" value="${el.color}" oninput="updateProp('color', this.value)"><label>${t('lbl_size')}</label><input type="number" step="0.5" value="${el.fontSize}" oninput="updateProp('fontSize', this.value)">`; }
            if(el.type === 'clock') { html += `<label>${t('lbl_clock_col')}</label><input type="color" value="${el.color}" oninput="updateProp('color', this.value)"><label>${t('lbl_size')}</label><input type="number" step="0.5" value="${el.fontSize}" oninput="updateProp('fontSize', this.value)">`; }
            if(el.type === 'shape') { html += `<label>${t('lbl_bg')}</label><input type="color" value="${el.bgColor}" oninput="updateProp('bgColor', this.value)">`; }
            content.innerHTML = html;
        }
        window.saveLayout = function(showAlert = true) { set(ref(db, `signage/${currentScreen}`), elements).then(() => { if(showAlert) alert(t('alert_save')); }); }

        document.querySelector(`.btn-lang[onclick="setSysLang('${sysLang}')"]`)?.classList.add('active');
        updateUILang();
    </script>
</body>
</html>
